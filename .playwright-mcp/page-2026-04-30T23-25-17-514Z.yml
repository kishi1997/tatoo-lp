      - heading "弟子入りという選択肢の落とし穴" [level=3] [ref=e155]
      - paragraph [ref=e156]: 日本では彫り師になるために弟子入りを選ぶ人が多くいます。しかしその実態は「無給で最低1〜3年間」の修行。
