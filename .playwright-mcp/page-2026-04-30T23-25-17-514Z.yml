    - generic [ref=e102]:
      - generic [ref=e103]:
        - text: Chapter
        - emphasis [ref=e104]: "02"
        - generic [ref=e105]: Why now
      - generic [ref=e106]:
        - heading "彫り師は、 今アツい職業。" [level=2] [ref=e107]:
          - text: 彫り師は、
          - text: 今アツい職業。
        - paragraph [ref=e108]: タトゥーをとりまく環境は大きく変わりました。技術を持つ彫り師の市場価値は、いま確実に高まっています。
    - generic [ref=e109]:
      - article [ref=e110]:
        - generic [ref=e111]: — 01
        - heading "インバウンド需要が急拡大" [level=3] [ref=e112]
        - paragraph [ref=e113]: 訪日外国人がタトゥーを目的に来日するケースが急増。東京は今や世界有数のタトゥースポットとして注目を集めています。
      - article [ref=e114]:
        - generic [ref=e115]: — 02
        - heading "ファッション・自己表現として定着" [level=3] [ref=e116]
        - paragraph [ref=e117]: 20〜30代を中心に、自己表現の手段としてタトゥーを選ぶ人が急速に増えています。社会的認知も着実に変わりつつあります。
      - article [ref=e118]:
        - generic [ref=e119]: — 03
        - heading "AIにも機械にも代替不可能" [level=3] [ref=e120]
        - paragraph [ref=e121]: 生身の人間の肌に施術する技術は、テクノロジーが進化しても機械やAIには代替できません。手に職をつけるなら今が最適です。
      - article [ref=e122]:
        - generic [ref=e123]: — 04
        - heading "実力者なら施術単価5万円〜" [level=3] [ref=e124]
        - paragraph [ref=e125]: 熟練した彫り師の施術単価は1件3〜10万円以上も珍しくありません。月20件なら月収100万円以上も現実の目標になります。
  - generic [ref=e127]:
    - generic [ref=e128]:
      - generic [ref=e129]:
        - text: Chapter
        - emphasis [ref=e130]: "03"
        - generic [ref=e131]: Reality
      - generic [ref=e132]:
        - heading "彫り師になるのは、 本当に難しい。" [level=2] [ref=e133]:
          - text: 彫り師になるのは、
          - text: 本当に難しい。
        - paragraph [ref=e134]: 「彫り師になりたい」と思っても、越えなければならない5つの壁があります。多くの人がここで数年を無駄にしています。
    - generic [ref=e135]:
      - article [ref=e136]:
        - generic [ref=e137]: "01"
        - heading "画力が求められる" [level=3] [ref=e138]
        - paragraph [ref=e139]: 単に「絵が上手い」だけでは不十分。肌の上で破綻なく機能するデザインを設計する力は、独学では体系的に身につきません。
      - article [ref=e140]:
        - generic [ref=e141]: "02"
        - heading "機材・安全知識が必須" [level=3] [ref=e142]
        - paragraph [ref=e143]: マシン・針・インク・衛生管理の誤った知識は仕上がりだけでなく健康被害に直結します。独学で安全に補える知識ではありません。
      - article [ref=e144]:
        - generic [ref=e145]: "03"
        - heading "実際に彫る経験が積めない" [level=3] [ref=e146]
        - paragraph [ref=e147]: タトゥーは実践練習が命。しかし自分の施術を受けてくれる相手を見つけるのは至難の業。経験値が積めないまま時間だけが過ぎていきます。
      - article [ref=e148]:
        - generic [ref=e149]: "04"
        - heading "独学では方向性を見失う" [level=3] [ref=e150]
        - paragraph [ref=e151]: 何が正しいかわからないまま手を動かし続け、誤った癖が定着してしまうケースも。独学では修正のタイミングが遅れがちです。
    - generic [ref=e153]:
